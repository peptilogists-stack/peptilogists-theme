- name: Deploy Theme
  run: |
    if [ "${GITHUB_REF##*/}" = "main" ]; then
      THEME_ID=$SHOPIFY_THEME_ID
      echo "🚀 Deploying to LIVE theme"
    else
      THEME_ID=$SHOPIFY_THEME_ID_DEV
      echo "🧪 Deploying to DEV theme"
    fi

    shopify theme push \
      --store $SHOPIFY_STORE \
      --access-token $SHOPIFY_ACCESS_TOKEN \
      --theme $THEME_ID \
      --allow-live
  env:
    SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
    SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
    SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID }}
    SHOPIFY_THEME_ID_DEV: ${{ secrets.SHOPIFY_THEME_ID_DEV }}

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deploy failed. Check logs."
    